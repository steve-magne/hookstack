name: Publish CLI to registry

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - registry/registry.json
      - packages/cli/**
      - .github/workflows/publish-cli.yml

concurrency:
  group: publish-cli
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Bump patch version
        id: bump
        working-directory: packages/cli
        run: |
          PUBLISHED=$(npm view hookstack-cli version 2>/dev/null || node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json','utf8'));
            process.stdout.write(pkg.version);
          ")
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const [maj, min, patch] = '$PUBLISHED'.split('.').map(Number);
            pkg.version = maj + '.' + min + '.' + (patch + 1);
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('new=' + pkg.version);
          " >> \$GITHUB_OUTPUT

      - name: Publish
        working-directory: packages/cli
        run: npm publish --access public --provenance

      - name: Publish summary
        run: |
          echo "## hookstack-cli v${{ steps.bump.outputs.new }} published to npm" >> $GITHUB_STEP_SUMMARY

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/cli/package.json
          git commit -m "chore: bump hookstack-cli version to v${{ steps.bump.outputs.new }} [skip ci]" || true
          git push
