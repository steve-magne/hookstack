name: Analyze Submitted Repository

# Déclenché quand une issue labellisée "repo-submission" est ouverte sur le
# dépôt du registre. L'agent Claude Code analyse le dépôt soumis et ouvre une
# PR ajoutant les hooks non encore présents dans registry/registry.json.

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  analyze:
    if: contains(github.event.issue.labels.*.name, 'repo-submission')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract repo URL from issue
        id: extract
        run: |
          REPO_URL=$(printf '%s' "${{ github.event.issue.body }}" | grep -oE 'https://github\.com/[A-Za-z0-9._/-]+' | head -1)
          echo "repo_url=$REPO_URL" >> "$GITHUB_OUTPUT"
          if [ -z "$REPO_URL" ]; then
            echo "Aucune URL de dépôt trouvée dans l'issue." >&2
            exit 1
          fi

      - name: Clone submitted repo
        run: git clone --depth 1 "${{ steps.extract.outputs.repo_url }}" /tmp/submitted-repo

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PROMPT=$(cat .github/prompts/analyze-repo.md)
          claude --print "$PROMPT" \
            --add-dir /tmp/submitted-repo \
            > /tmp/new-hooks.json || true
          # Garde uniquement le bloc JSON renvoyé
          node .claude/skills/analyze-repo/scripts/extract-json.js /tmp/new-hooks.json > /tmp/new-hooks.clean.json
          mv /tmp/new-hooks.clean.json /tmp/new-hooks.json

      - name: Merge new hooks into registry
        id: merge
        run: |
          node .claude/skills/analyze-repo/scripts/merge-hooks.js /tmp/new-hooks.json registry/registry.json "${{ steps.extract.outputs.repo_url }}"
          echo "added=$(cat /tmp/added-count.txt 2>/dev/null || echo 0)" >> "$GITHUB_OUTPUT"

      - name: Create PR if new hooks found
        if: steps.merge.outputs.added != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/new-hooks-$(date +%Y%m%d%H%M)"
          git config user.name "hookstack-bot"
          git config user.email "bot@hookstack.dev"
          git checkout -b "$BRANCH"
          git add registry/registry.json
          git commit -m "auto: add ${{ steps.merge.outputs.added }} hook(s) from ${{ steps.extract.outputs.repo_url }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "New hooks from ${{ steps.extract.outputs.repo_url }}" \
            --body "Hooks auto-détectés depuis la soumission #${{ github.event.issue.number }}. Review humaine requise." \
            --label "auto-generated"
