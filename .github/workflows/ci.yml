name: CI

# Garde-fou qualité sur chaque PR / push :
#   - typecheck + tests unitaires (dont les 62 hooks)
#   - validate:registry : échoue si registry.json viole registry.schema.json
#     (champ requis manquant, énumération invalide, champ inconnu)
#   - sync-hooks --check : échoue si registry.json a dérivé des .mjs sur disque
#     (les .mjs sont la source de vérité du code ; code_snippet en dérive)
#   - ci-check-content : liens relatifs cassés + images manquantes dans tous les .md/.mdx

on:
  push:
    branches: [main]
  pull_request:

# Lecture seule : ce workflow ne fait que checkout + install + test.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — historique git complet requis par le « Hooks timeline drift
      # guard » : .claude/hooks-timeline.mjs dérive la date de premier ajout de chaque
      # hook via `git log --diff-filter=A`. Un clone superficiel (défaut) daterait tous
      # les hooks du dernier commit → faux positif de dérive.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Registry schema validation
        run: pnpm validate:registry

      - name: Registry sync drift guard
        run: node .claude/sync-hooks.mjs --check

      - name: Hooks timeline drift guard
        run: node .claude/hooks-timeline.mjs --check

      - name: OKF bundle conformance guard
        run: node scripts/okf.mjs validate --strict

      - name: Dead link & image check (full repo)
        run: node scripts/ci-check-content.mjs
