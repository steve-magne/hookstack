<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OKF — graphe de connaissance</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  :root{color-scheme:dark}
  body{margin:0;font:14px/1.5 system-ui,sans-serif;background:#0a0e14;color:#e6e6e6;display:flex;height:100vh}
  #net{flex:1;min-width:0}
  #side{width:340px;border-left:1px solid #1f2937;padding:16px;overflow:auto;background:#0d1219}
  h1{font-size:15px;margin:0 0 12px;color:#22d3ee}
  input,select{width:100%;box-sizing:border-box;background:#111827;color:#e6e6e6;border:1px solid #374151;border-radius:6px;padding:6px 8px;margin-bottom:8px}
  #legend span{display:inline-flex;align-items:center;gap:4px;margin:2px 8px 2px 0;font-size:12px}
  #legend i{width:10px;height:10px;border-radius:50%;display:inline-block}
  #detail{margin-top:12px;border-top:1px solid #1f2937;padding-top:12px}
  #detail .t{color:#f472b6;font-weight:600}
  #detail a{color:#22d3ee;text-decoration:none;display:block;margin:2px 0}
  .muted{color:#6b7280}
</style></head>
<body>
<div id="net"></div>
<div id="side">
  <h1>OKF — graphe</h1>
  <input id="q" placeholder="Rechercher un concept…">
  <select id="layout"><option value="hier">Disposition hiérarchique</option><option value="force">Disposition libre (force)</option></select>
  <div id="legend"></div>
  <div id="detail" class="muted">Cliquer un nœud pour le détail.</div>
</div>
<script>
const DATA = {"nodes":[{"id":"architecture/claude-code-tooling.md","label":"Outillage Claude Code — hooks, quality gates, guardrails","type":"Architecture","dir":"architecture","description":"Pourquoi le repo s'appuie sur des hooks Claude Code pour imposer zéro dette et bloquer les actions dangereuses."},{"id":"architecture/cli-scopes.md","label":"Scopes d'installation CLI — 5 scopes, 3 agents","type":"Architecture","dir":"architecture","description":"Les 5 cibles d'installation du CLI hookstack-cli, le format de config et la réécriture des chemins par scope."},{"id":"architecture/multi-agent-portability.md","label":"Portabilité multi-agent — un hook, trois agents","type":"Architecture","dir":"architecture","description":"Pourquoi le code .mjs est identique entre Claude Code, Codex et Copilot, seul le format de config diffère."},{"id":"architecture/overview.md","label":"Vue d'ensemble — mono-repo, stack, conventions","type":"Architecture","dir":"architecture","description":"Structure du repo Hookstack, stack technique et conventions de code."},{"id":"architecture/registry-sync.md","label":"Sync catalogue → projet (le .mjs est la vérité)","type":"Architecture","dir":"architecture","description":"Les .claude/hooks/*.mjs sont la source de vérité du code ; registry.json en dérive code_snippet ; settings.json est reconstruit."},{"id":"business/growth.md","label":"Croissance et système d'exécution marketing","type":"Reference","dir":"business","description":"Objectif 5000 étoiles GitHub et trafic hookstack.app, pilotés par un système d'exécution dédié dans un repo marketing séparé."},{"id":"business/monetization.md","label":"Modèle économique","type":"Reference","dir":"business","description":"Catalogue et CLI gratuits pour construire l'audience ; tier Pro futur ciblant les usages équipe, sans monétisation précoce."},{"id":"implementation/cli-contribute-command.md","label":"cli contribute command","type":"?","dir":"implementation","description":""},{"id":"implementation/o f @clack/prompts, des flags multi-agent, de la fusion intelligente mergeConfig et de la table de sécurité côté CI."},{"id":"roadmap/improvement-plan.md","label":"Plan d'amélioration produit et technique","type":"Playbook","dir":"roadmap","description":"Priorités d'évolution de Hookstack par horizon, du profil projet personnalisé à la monétisation, avec le maintien technique continu."},{"id":"strategy/backlog.md","label":"Mémoire des décisions stratégiques","type":"Reference","dir":"strategy","description":"Archive des idées rejetées et pivots documentés de Hookstack, pour ne pas les reproposer ; le backlog actionnable vit dans les GitHub Issues."},{"id":"vision/mission.md","label":"Mission de Hookstack","type":"Reference","dir":"vision","description":"Pourquoi Hookstack existe — un catalogue communautaire de hooks agentiques agnostique de l'agent, qui transforme un hook écrit une fois en un levier déployé sur trois écosystèmes."},{"id":"vision/personas.md","label":"Personas cibles de Hookstack","type":"Persona","dir":"vision","description":"Les trois profils utilisateurs de Hookstack — DevSecOps Enterprise, Explorateur IA/Early Adopter, Architecte Platform/AI Champion — et comment la portée multi-agent élargit chaque cible."}],"edges":[{"from":"architecture/claude-code-tooling.md","to":"product/hook-101.md"},{"from":"architecture/claude-code-tooling.md","to":"meta/self-improvement.md"},{"from":"architecture/cli-scopes.md","to":"product/ux-cli-delivery.md"},{"from":"architecture/cli-scopes.md","to":"architecture/multi-agent-portability.md"},{"from":"architecture/multi-agent-portability.md","to":"marketing/strategy.md"},{"from":"architecture/multi-agent-portability.md","to":"architecture/cli-scopes.md"},{"from":"architecture/multi-agent-portability.md","to":"vision/mission.md"},{"from":"architecture/overview.md","to":"architecture/registry-sync.md"},{"from":"architecture/overview.md","to":"architecture/cli-scopes.md"},{"from":"architecture/overview.md","to":"architecture/claude-code-tooling.md"},{"from":"architecture/registry-sync.md","to":"architecture/claude-code-tooling.md"},{"from":"business/growth.md","to":"business/monetization.md"},{"from":"business/growth.md","to":"vision/mission.md"},{"from":"business/growth.md","to":"marketing/strategy.md"},{"from":"business/monetization.md","to":"vision/personas.md"},{"from":"business/monetization.md","to":"business/growth.md"},{"from":"business/monetization.md","to":"marketing/strategy.md"},{"from":"business/monetization.md","to":"roadmap/improvement-plan.md"},{"from":"marketing/strategy.md","to":"vision/personas.md"},{"from":"marketing/strategy.md","to":"architecture/multi-agent-portability.md"},{"from":"marketing/strategy.md","to":"business/growth.md"},{"from":"marketing/strategy.md","to":"product/features-catalog.md"},{"from":"meta/agent-protocol.md","to":"vision/mission.md"},{"from":"meta/agent-protocol.md","to":"meta/self-improvement.md"},{"from":"meta/agent-protocol.md","to":"meta/self-improvement.md"},{"from":"meta/self-improvement.md","to":"vision/mission.md"},{"from":"meta/self-improvement.md","to":"meta/porting.md"},{"from":"product/features-catalog.md","to":"product/ux-cli-delivery.md"},{"from":"product/features-catalog.md","to":"product/hook-101.md"},{"from":"product/features-catalog.md","to":"product/hook-101.md"},{"from":"product/features-catalog.md","to":"product/ux-cli-delivery.md"},{"from":"product/features-catalog.md","to":"vision/mission.md"},{"from":"product/features-catalog.md","to":"vision/personas.md"},{"from":"product/features-catalog.md","to":"business/growth.md"},{"from":"product/hook-101.md","to":"product/ux-cli-delivery.md"},{"from":"product/hook-101.md","to":"product/features-catalog.md"},{"from":"product/hook-101.md","to":"architecture/overview.md"},{"from":"product/hook-101.md","to":"architecture/multi-agent-portability.md"},{"from":"product/ux-cli-delivery.md","to":"architecture/multi-agent-portability.md"},{"from":"product/ux-cli-delivery.md","to":"product/hook-101.md"},{"from":"product/ux-cli-delivery.md","to":"product/features-catalog.md"},{"from":"product/ux-cli-delivery.md","to":"vision/mission.md"},{"from":"product/ux-cli-delivery.md","to":"architecture/overview.md"},{"from":"roadmap/improvement-plan.md","to":"business/monetization.md"},{"from":"roadmap/improvement-plan.md","to":"business/growth.md"},{"from":"roadmap/improvement-plan.md","to":"marketing/strategy.md"},{"from":"strategy/backlog.md","to":"business/growth.md"},{"from":"strategy/backlog.md","to":"marketing/strategy.md"},{"from":"strategy/backlog.md","to":"architecture/multi-agent-portability.md"},{"from":"strategy/backlog.md","to":"vision/mission.md"},{"from":"strategy/backlog.md","to":"business/monetization.md"},{"from":"vision/mission.md","to":"architecture/multi-agent-portability.md"},{"from":"vision/mission.md","to":"vision/personas.md"},{"from":"vision/mission.md","to":"product/hook-101.md"},{"from":"vision/mission.md","to":"product/ux-cli-delivery.md"},{"from":"vision/mission.md","to":"architecture/overview.md"},{"from":"vision/mission.md","to":"business/growth.md"},{"from":"vision/personas.md","to":"architecture/multi-agent-portability.md"},{"from":"vision/personas.md","to":"vision/mission.md"},{"from":"vision/personas.md","to":"product/ux-cli-delivery.md"},{"from":"vision/personas.md","to":"product/features-catalog.md"},{"from":"vision/personas.md","to":"marketing/strategy.md"}]};
const PALETTE = ["#22d3ee","#f472b6","#a78bfa","#34d399","#fbbf24","#60a5fa","#fb7185","#4ade80","#e879f9","#f59e0b"];
const types=[...new Set(DATA.nodes.map(n=>n.type))];
const color=t=>PALETTE[types.indexOf(t)%PALETTE.length];
const byId=Object.fromEntries(DATA.nodes.map(n=>[n.id,n]));
const visNodes=new vis.DataSet(DATA.nodes.map(n=>({id:n.id,label:n.label,color:color(n.type),shape:"dot",size:14,font:{color:"#e6e6e6"}})));
const visEdges=new vis.DataSet(DATA.edges.map((e,i)=>({id:i,from:e.from,to:e.to,arrows:"to",color:{color:"#374151",highlight:"#22d3ee"}})));
const container=document.getElementById("net");
function opts(layout){return{physics:layout==="force",layout:layout==="hier"?{hierarchical:{enabled:true,direction:"UD",sortMethod:"directed",levelSeparation:120,nodeSpacing:160}}:{},interaction:{hover:true,tooltipDelay:120}};}
let net=new vis.Network(container,{nodes:visNodes,edges:visEdges},opts("hier"));
document.getElementById("layout").onchange=e=>{net.setOptions(opts(e.target.value));};
const legend=document.getElementById("legend");
legend.innerHTML=types.map(t=>'<span><i style="background:'+color(t)+'"></i>'+t+'</span>').join("");
const detail=document.getElementById("detail");
function show(id){const n=byId[id];if(!n){detail.className="muted";detail.textContent="—";return;}
  const outs=DATA.edges.filter(e=>e.from===id).map(e=>'<a href="#" data-id="'+e.to+'">→ '+(byId[e.to]?.label||e.to)+'</a>').join("")||'<span class="muted">aucun</span>';
  const ins=DATA.edges.filter(e=>e.to===id).map(e=>'<a href="#" data-id="'+e.from+'">← '+(byId[e.from]?.label||e.from)+'</a>').join("")||'<span class="muted">aucun</span>';
  detail.className="";detail.innerHTML='<div class="t">'+n.label+'</div><div class="muted">'+n.type+' · /'+n.id+'</div><p>'+(n.description||'')+'</p><b>Liens sortants</b>'+outs+'<b>Cité par</b>'+ins;
  detail.querySelectorAll("a[data-id]").forEach(a=>{a.onclick=ev=>{ev.preventDefault();net.selectNodes([a.dataset.id]);net.focus(a.dataset.id,{scale:1.1,animation:true});show(a.dataset.id);};});}
net.on("click",p=>{if(p.nodes.length)show(p.nodes[0]);});
document.getElementById("q").oninput=e=>{const q=e.target.value.toLowerCase();if(!q)return;const hit=DATA.nodes.find(n=>n.label.toLowerCase().includes(q)||n.id.toLowerCase().includes(q));if(hit){net.selectNodes([hit.id]);net.focus(hit.id,{scale:1.1,animation:true});show(hit.id);}};
</script>
</body></html>
